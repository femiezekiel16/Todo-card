<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <article data-testid="test-todo-card" class="todo-card priority-high">
      <!-- VIEW MODE -->
      <div id="viewMode">
        <h3 data-testid="test-todo-title" id="title">
          Update Stage-0 Project to be Interactive
        </h3>

        <div>
          <span data-testid="test-todo-priority-indicator">🔴</span>
          <span data-testid="test-todo-priority" id="priority">High</span>
        </div>

        <div data-testid="test-todo-status">
          Status: <span id="statusText">Pending</span>
        </div>

        <select data-testid="test-todo-status-control" id="statusControl">
          <option>Pending</option>
          <option>In Progress</option>
          <option>Done</option>
        </select>

        <input
          type="checkbox"
          data-testid="test-todo-complete-toggle"
          id="checkbox"
        />

        <button
          data-testid="test-todo-expand-toggle"
          aria-expanded="false"
          aria-controls="collapsible"
        >
          Expand
        </button>

        <div
          data-testid="test-todo-collapsible-section"
          id="collapsible"
          class="hidden"
        >
          <p data-testid="test-todo-description" id="desc">
            This project is a non-negotiable prerequisite for stage-1 promotion.
          </p>
        </div>

        <div>
          <time data-testid="test-todo-due-date" id="dueDate"></time>
          <span
            data-testid="test-todo-time-remaining"
            id="timeRemaining"
            aria-live="polite"
          ></span>
          <span data-testid="test-todo-overdue-indicator" id="overdue"></span>
        </div>

        <ul data-testid="test-todo-tags" class="tags" id="tags"></ul>

        <button data-testid="test-todo-edit-button" id="editBtn">Edit</button>
        <button data-testid="test-todo-delete-button">Delete</button>
      </div>

      <!-- EDIT MODE -->
      <div id="editMode" class="hidden" data-testid="test-todo-edit-form">
        <label>Title</label>
        <input data-testid="test-todo-edit-title-input" id="editTitle" />

        <label>Description</label>
        <textarea
          data-testid="test-todo-edit-description-input"
          id="editDesc"
        ></textarea>

        <label>Priority</label>
        <select data-testid="test-todo-edit-priority-select" id="editPriority">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>

        <label>Due Date</label>
        <input
          type="datetime-local"
          data-testid="test-todo-edit-due-date-input"
          id="editDue"
        />

        <button data-testid="test-todo-save-button" id="saveBtn">Save</button>
        <button data-testid="test-todo-cancel-button" id="cancelBtn">
          Cancel
        </button>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
