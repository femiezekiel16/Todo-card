<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Main Todo Card -->
    <article data-testid="test-todo-card" class="todo-card">
      <!-- Header -->
      <header class="card-header">
        <h3 data-testid="test-todo-title">Finish Frontend Project</h3>
        <span data-testid="test-todo-priority" class="priority high">High</span>
      </header>

      <!-- Description -->
      <p data-testid="test-todo-description">
        Complete the todo card UI and add dynamic time tracking.
      </p>

      <!-- Time Info -->
      <div class="time-info">
        <time
          data-testid="test-todo-due-date"
          id="due-date"
          datetime="2026-04-20T18:00:00"
        >
        </time>

        <span data-testid="test-todo-time-remaining" id="time-remaining"></span>
      </div>

      <!-- Status -->
      <div class="status-section">
        <input
          type="checkbox"
          id="complete-toggle"
          data-testid="test-todo-complete-toggle"
        />
        <label for="complete-toggle">Mark as complete</label>

        <span data-testid="test-todo-status" id="status">Pending</span>
      </div>

      <!-- Tags -->
      <ul data-testid="test-todo-tags" class="tags">
        <li data-testid="test-todo-tag-work">Work</li>
        <li data-testid="test-todo-tag-frontend">Frontend</li>
      </ul>

      <!-- Actions -->
      <div class="actions">
        <button
          data-testid="test-todo-edit-button"
          id="edit-btn"
          aria-label="Edit task"
        >
          ✏️
        </button>

        <button
          data-testid="test-todo-delete-button"
          id="delete-btn"
          aria-label="Delete task"
        >
          🗑️
        </button>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
